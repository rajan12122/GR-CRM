name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Simulator App
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Web App
        run: npm run build
        working-directory: frontend

      - name: Sync Capacitor iOS
        run: npx cap sync ios
        working-directory: frontend

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: frontend/ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('frontend/ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # OPTIONAL: Code signing step for real devices (.ipa)
      # To enable this, uncomment the steps below and add the required secrets to your GitHub Repository:
      # - BUILD_CERTIFICATE_BASE64: base64 encoded p12 signing certificate
      # - P12_PASSWORD: password of the p12 certificate
      # - BUILD_PROVISION_PROFILE_BASE64: base64 encoded provisioning profile
      # - KEYCHAIN_PASSWORD: secure password to unlock runner's temporary keychain
      #
      # - name: Install Apple Certificate and Provisioning Profile
      #   run: |
      #     # Create variables
      #     CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
      #     PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
      #     KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
      #
      #     # Import certificate and provisioning profile from secrets
      #     echo -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
      #     echo -n "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode -o $PP_PATH
      #
      #     # Create temporary keychain
      #     security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
      #     security default-keychain -s $KEYCHAIN_PATH
      #     security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
      #
      #     # Import certificate to keychain
      #     security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign -T /usr/bin/security
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
      #
      #     # Apply provisioning profile
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Xcode Project (Simulator Build)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -derivedDataPath build \
                     clean build
        working-directory: frontend

      # OPTIONAL: Archive & Export IPA for real devices
      # If you uncommented the signing step above, use this step to export the IPA:
      # - name: Archive App
      #   run: |
      #     xcodebuild -workspace ios/App/App.xcworkspace \
      #                -scheme App \
      #                -configuration Release \
      #                -archivePath $RUNNER_TEMP/App.xcarchive \
      #                archive
      #   working-directory: frontend
      #
      # - name: Export IPA
      #   run: |
      #     xcodebuild -exportArchive \
      #                -archivePath $RUNNER_TEMP/App.xcarchive \
      #                -exportOptionsPlist ios/App/App/ExportOptions.plist \
      #                -exportPath $RUNNER_TEMP/build
      #   working-directory: frontend

      - name: Zip Simulator App
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r App-Simulator.zip App.app
        working-directory: frontend

      - name: Upload Simulator Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: frontend/build/Build/Products/Debug-iphonesimulator/App-Simulator.zip
          retention-days: 7
